<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src data:"
  >
  <script src="mermaid.min.js"></script>
  <script>
    window.renderMermaid = async function (source, identifier, darkMode) {
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        suppressErrorRendering: true,
        theme: darkMode ? "dark" : "default",
        flowchart: { htmlLabels: false },
        maxTextSize: 50000,
        maxEdges: 500
      });
      const result = await mermaid.render(identifier, source);
      return result.svg;
    };
  </script>
</head>
<body></body>
</html>
